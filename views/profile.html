<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>โปรไฟล์ส่วนตัว | ShopZone</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">🛍 ShopZone</a>
    <ul class="navbar-nav">
      <a href="/">หน้าหลัก</a>
      <a href="/cart" class="cart-badge">🛒<span class="badge" id="cart-count" style="display:none;">0</span></a>
      <span id="nav-auth"></span>
    </ul>
  </nav>

  <div class="container section flex-center" style="align-items:flex-start;min-height:80vh;">
    <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(350px, 1fr));gap:24px;width:100%;max-width:900px;">
      
      <!-- Profile Card -->
      <div class="auth-card" style="margin:0;width:100%;max-width:none;">
        <h2 class="auth-title">👤 ข้อมูลส่วนตัว</h2>
        <form id="profile-form" onsubmit="updateProfile(event)">
          <div class="form-group">
            <label class="form-label">ชื่อผู้ใช้ (Username)</label>
            <input type="text" id="username" class="form-control" disabled style="background:var(--bg-card2);cursor:not-allowed;">
          </div>
          <div class="form-group">
            <label class="form-label">อีเมล</label>
            <input type="email" id="email" class="form-control" disabled style="background:var(--bg-card2);cursor:not-allowed;">
          </div>
          <div class="form-group">
            <label class="form-label">ชื่อ-นามสกุล</label>
            <input type="text" id="full_name" class="form-control" placeholder="ชื่อ นามสกุล">
          </div>
          <div class="form-group">
            <label class="form-label">เบอร์โทรศัพท์</label>
            <input type="tel" id="phone" class="form-control" placeholder="08xxxxxxxx">
          </div>
          <div class="form-group">
            <label class="form-label">ที่อยู่จัดส่งสินค้า</label>
            <textarea id="address" class="form-control" rows="4" placeholder="ระบุที่อยู่จัดส่งสินค้าอย่างละเอียด"></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="btn-save-profile">บันทึกข้อมูล</button>
        </form>
      </div>

      <!-- Password Card -->
      <div class="auth-card" style="margin:0;width:100%;max-width:none;align-self:start;">
        <h2 class="auth-title">🔒 เปลี่ยนรหัสผ่าน</h2>
        <form id="password-form" onsubmit="changePassword(event)">
          <div class="form-group">
            <label class="form-label">รหัสผ่านปัจจุบัน</label>
            <input type="password" id="old_password" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">รหัสผ่านใหม่</label>
            <input type="password" id="new_password" class="form-control" minlength="6" required>
          </div>
          <div class="form-group">
            <label class="form-label">ยืนยันรหัสผ่านใหม่</label>
            <input type="password" id="confirm_password" class="form-control" minlength="6" required>
          </div>
          <button type="submit" class="btn btn-warning btn-block" id="btn-save-password">เปลี่ยนรหัสผ่าน</button>
        </form>
      </div>

    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script>
    async function loadProfile() {
      const data = await api('/api/auth/profile');
      if (!data.success) {
        window.location.href = '/login';
        return;
      }
      
      const user = data.user;
      document.getElementById('username').value = user.username;
      document.getElementById('email').value = user.email;
      document.getElementById('full_name').value = user.full_name || '';
      document.getElementById('phone').value = user.phone || '';
      document.getElementById('address').value = user.address || '';
    }

    async function updateProfile(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-save-profile');
      btn.disabled = true;
      btn.textContent = 'กำลังบันทึก...';

      const body = {
        full_name: document.getElementById('full_name').value,
        phone: document.getElementById('phone').value,
        address: document.getElementById('address').value
      };

      const res = await api('/api/auth/profile', {
        method: 'PUT',
        body: JSON.stringify(body)
      });

      if (res.success) {
        showToast('อัปเดตข้อมูลสำเร็จ', 'success');
        await initNavbar(); // Refresh navbar name
      } else {
        showToast(res.message, 'error');
      }

      btn.disabled = false;
      btn.textContent = 'บันทึกข้อมูล';
    }

    async function changePassword(e) {
      e.preventDefault();
      
      const old_password = document.getElementById('old_password').value;
      const new_password = document.getElementById('new_password').value;
      const confirm_password = document.getElementById('confirm_password').value;

      if (new_password !== confirm_password) {
        return showToast('รหัสผ่านใหม่และยืนยันรหัสผ่านไม่ตรงกัน', 'warning');
      }

      const btn = document.getElementById('btn-save-password');
      btn.disabled = true;
      btn.textContent = 'กำลังเปลี่ยน...';

      const res = await api('/api/auth/password', {
        method: 'PUT',
        body: JSON.stringify({ old_password, new_password })
      });

      if (res.success) {
        showToast('เปลี่ยนรหัสผ่านสำเร็จ', 'success');
        document.getElementById('password-form').reset();
      } else {
        showToast(res.message, 'error');
      }

      btn.disabled = false;
      btn.textContent = 'เปลี่ยนรหัสผ่าน';
    }

    // Init
    (async () => {
      await initNavbar();
      await loadProfile();
    })();
  </script>
</body>
</html>
