<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ | ShopZone</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-wrap { width: 100%; max-width: 440px; }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo h1 {
      font-size: 2.2rem; font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .auth-logo p { color: var(--text-muted); margin-top: 4px; }
    .auth-card { padding: 36px; }
    .auth-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
    .auth-sub { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 28px; }
    .divider { text-align: center; color: var(--text-muted); font-size: 0.85rem;
      margin: 20px 0; position: relative; }
    .divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0;
      height: 1px; background: var(--border); }
    .divider span { background: var(--bg-card); padding: 0 12px; position: relative; }
    .auth-bg {
      position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(ellipse at 60% 20%, rgba(108,99,255,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse at 10% 80%, rgba(67,198,172,0.08) 0%, transparent 50%);
    }
  </style>
</head>
<body>
  <div class="auth-bg"></div>
  <div class="auth-wrap">
    <div class="auth-logo">
      <h1>🛍 ShopZone</h1>
      <p>ยินดีต้อนรับกลับมา</p>
    </div>
    <div class="card auth-card">
      <div class="auth-title">เข้าสู่ระบบ</div>
      <div class="auth-sub">กรอกข้อมูลเพื่อเข้าสู่บัญชีของคุณ</div>

      <div id="alert-box"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label">ชื่อผู้ใช้ / อีเมล</label>
          <input type="text" class="form-control" id="username" placeholder="กรอกชื่อผู้ใช้หรืออีเมล" required>
        </div>
        <div class="form-group">
          <label class="form-label">รหัสผ่าน</label>
          <div style="position:relative;">
            <input type="password" class="form-control" id="password" placeholder="กรอกรหัสผ่าน" required>
            <button type="button" onclick="togglePw()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.1rem;">👁</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;" id="login-btn">
          เข้าสู่ระบบ
        </button>
      </form>

      <div class="divider"><span>หรือ</span></div>

      <a href="/register" class="btn btn-secondary" style="width:100%;text-align:center;">สมัครสมาชิกใหม่</a>

      <div style="margin-top:16px;text-align:center;font-size:0.8rem;color:var(--text-muted);">
        แอดมิน: <code>admin</code> / <code>admin123</code>
      </div>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script>
    function togglePw() {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.disabled = true; btn.textContent = 'กำลังเข้าสู่ระบบ...';

      const data = await api('/api/auth/login', {
        method: 'POST',
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        })
      });

      if (data.success) {
        showToast('เข้าสู่ระบบสำเร็จ!', 'success');
        setTimeout(() => {
          window.location.href = data.user.role === 'admin' ? '/admin' : '/';
        }, 800);
      } else {
        document.getElementById('alert-box').innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
        btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ';
      }
    });

    // Check already logged in
    (async () => {
      const data = await api('/api/auth/me');
      if (data.success && data.user) {
        window.location.href = data.user.role === 'admin' ? '/admin' : '/';
      }
    })();
  </script>
</body>
</html>
