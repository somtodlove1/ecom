<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายละเอียดสินค้า | ShopZone</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .product-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; margin-top: 40px; }
    .img-main { width: 100%; border-radius: var(--radius); background: var(--bg-card2);
      aspect-ratio: 1/1; object-fit: cover; }
    .price-big { font-size: 2rem; font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    @media (max-width: 768px) { .product-detail-grid { grid-template-columns: 1fr; gap: 24px; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">🛍 ShopZone</a>
    <ul class="navbar-nav">
      <a href="/">หน้าหลัก</a>
      <span id="nav-admin" style="display:none;"><a href="/admin">⚙️ แอดมิน</a></span>
      <a href="/cart" class="cart-badge">🛒 ตะกร้า<span class="badge" id="cart-count" style="display:none;">0</span></a>
      <span id="nav-auth"></span>
    </ul>
  </nav>

  <div class="container">
    <div style="padding:24px 0;color:var(--text-muted);font-size:0.9rem;">
      <a href="/" style="color:var(--primary);">หน้าหลัก</a> / <span id="breadcrumb">สินค้า</span>
    </div>

    <div id="product-content">
      <div class="flex-center" style="padding:100px;"><div class="spinner"></div></div>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script>
    const productId = location.pathname.split('/').pop();

    async function loadProduct() {
      const data = await api(`/api/products/${productId}`);
      if (!data.success) {
        document.getElementById('product-content').innerHTML =
          '<div class="empty-state"><div class="icon">😕</div><h3>ไม่พบสินค้า</h3></div>';
        return;
      }
      const p = data.product;
      document.title = `${p.name} | ShopZone`;
      document.getElementById('breadcrumb').textContent = p.name;

      document.getElementById('product-content').innerHTML = `
        <div class="product-detail-grid">
          <div>
            <img class="img-main" src="${p.image_url || ''}" alt="${p.name}"
                 onerror="this.src='https://placehold.co/500x500/161628/6C63FF?text=No+Image'">
          </div>
          <div>
            <span class="product-category">${p.category_name || 'ทั่วไป'}</span>
            <h1 style="font-size:1.8rem;font-weight:700;margin:12px 0 8px;">${p.name}</h1>
            <div class="price-big">${formatPrice(p.price)}</div>
            <div style="color:var(--text-muted);font-size:0.85rem;margin-top:4px;">
              ${p.stock > 0 
                ? `<span style="color:var(--success);">● มีสินค้า</span> เหลือ ${p.stock} ชิ้น`
                : `<span style="color:var(--danger);">● สินค้าหมด</span>`
              }
            </div>

            <div style="margin:24px 0;padding:20px;background:var(--bg-card2);border-radius:var(--radius-sm);">
              <div style="font-weight:600;margin-bottom:8px;">รายละเอียดสินค้า</div>
              <p style="color:var(--text-muted);line-height:1.8;font-size:0.95rem;">${p.description || 'ไม่มีรายละเอียด'}</p>
            </div>

            <div class="flex" style="gap:12px;flex-wrap:wrap;">
              <div class="qty-control" id="qty-ctrl">
                <button class="qty-btn" onclick="changeQty(-1)">−</button>
                <span class="qty-display" id="qty-val">1</span>
                <button class="qty-btn" onclick="changeQty(1)">+</button>
              </div>
              ${p.stock > 0
                ? `<button class="btn btn-primary btn-lg" onclick="addWithQty(${p.id})" style="flex:1;">🛒 เพิ่มลงตะกร้า</button>`
                : `<button class="btn btn-secondary btn-lg" disabled style="flex:1;">สินค้าหมด</button>`
              }
            </div>
            <div style="margin-top:12px;">
              <a href="/" class="btn btn-outline" style="margin-right:8px;">← กลับ</a>
              <a href="/cart" class="btn btn-secondary">ดูตะกร้าสินค้า</a>
            </div>
          </div>
        </div>
      `;
    }

    let qty = 1;
    function changeQty(delta) {
      qty = Math.max(1, qty + delta);
      document.getElementById('qty-val').textContent = qty;
    }

    async function addWithQty(productId) {
      const data = await api('/api/cart/add', {
        method: 'POST',
        body: JSON.stringify({ product_id: productId, quantity: qty })
      });
      if (data.success) {
        showToast('เพิ่มสินค้าลงตะกร้าแล้ว', 'success');
        const c = await api('/api/cart/count');
        if (c.success) {
          const badge = document.getElementById('cart-count');
          badge.textContent = c.count; badge.style.display = 'flex';
        }
      } else if (data.message?.includes('เข้าสู่ระบบ')) {
        showToast('กรุณาเข้าสู่ระบบก่อน', 'warning');
        setTimeout(() => window.location.href = '/login', 1500);
      } else {
        showToast(data.message, 'error');
      }
    }

    (async () => {
      await initNavbar();
      await loadProduct();
    })();
  </script>
</body>
</html>
