<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แผงแอดมิน | ShopZone</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .stat-icon-1 { background: rgba(108,99,255,0.2); }
    .stat-icon-2 { background: rgba(255,101,132,0.2); }
    .stat-icon-3 { background: rgba(67,198,172,0.2); }
    .stat-icon-4 { background: rgba(255,152,0,0.2); }
    .recent-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 1024px) { .recent-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">🛍 ShopZone</div>
      <ul class="sidebar-nav">
        <li><a href="/admin" class="active">📊 แดชบอร์ด</a></li>
        <li><a href="/admin/products">📦 จัดการสินค้า</a></li>
        <li><a href="/admin/orders">🧾 จัดการออเดอร์</a></li>
        <li><a href="/admin/members">👥 สมาชิก</a></li>
        <li style="margin-top:auto;"><a href="/">🏠 หน้าร้าน</a></li>
        <li><a href="#" onclick="logout()">🚪 ออกจากระบบ</a></li>
      </ul>
    </aside>

    <!-- Content -->
    <div class="admin-content">
      <div class="admin-header">
        <div>
          <h2 style="font-weight:700;">แดชบอร์ด</h2>
          <p style="color:var(--text-muted);font-size:0.85rem;">ภาพรวมระบบ</p>
        </div>
        <div style="color:var(--text-muted);font-size:0.85rem;" id="admin-name"></div>
      </div>

      <div class="admin-body">
        <!-- Stats -->
        <div class="stats-grid" id="stats-grid">
          <div class="flex-center" style="padding:40px;grid-column:1/-1;"><div class="spinner"></div></div>
        </div>

        <!-- Recent -->
        <div class="recent-grid">
          <div class="card">
            <div class="flex-between mb-16">
              <div style="font-weight:700;">ออเดอร์ล่าสุด</div>
              <a href="/admin/orders" class="btn btn-secondary btn-sm">ดูทั้งหมด</a>
            </div>
            <div id="recent-orders"></div>
          </div>
          <div class="card">
            <div class="flex-between mb-16">
              <div style="font-weight:700;">รอตรวจสลิป</div>
              <a href="/admin/orders?status=slip_uploaded" class="btn btn-warning btn-sm">จัดการ</a>
            </div>
            <div id="pending-slips"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script>
    async function loadDashboard() {
      const [ordersData, membersData, productsData] = await Promise.all([
        api('/api/orders'),
        api('/api/members'),
        api('/api/products/admin/all')
      ]);

      const orders = ordersData.success ? ordersData.orders : [];
      const members = membersData.success ? membersData.members : [];
      const products = productsData.success ? productsData.products : [];

      const totalRevenue = orders.filter(o => o.status === 'completed').reduce((s, o) => s + parseFloat(o.total_amount), 0);
      const pendingOrders = orders.filter(o => o.status === 'pending' || o.status === 'slip_uploaded').length;

      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card">
          <div class="stat-icon stat-icon-1">📦</div>
          <div><div class="stat-value">${products.filter(p => p.is_active).length}</div><div class="stat-label">สินค้าทั้งหมด</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-icon-2">🧾</div>
          <div><div class="stat-value">${orders.length}</div><div class="stat-label">ออเดอร์ทั้งหมด</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-icon-3">👥</div>
          <div><div class="stat-value">${members.length}</div><div class="stat-label">สมาชิกทั้งหมด</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-icon-4">💰</div>
          <div><div class="stat-value">${formatPrice(totalRevenue)}</div><div class="stat-label">รายได้รวม</div></div>
        </div>
      `;

      const recentOrders = orders.slice(0, 5);
      document.getElementById('recent-orders').innerHTML = recentOrders.length
        ? recentOrders.map(o => `
          <div class="flex-between" style="padding:10px 0;border-bottom:1px solid var(--border);">
            <div>
              <div style="font-weight:600;font-size:0.9rem;">#${o.id} - ${o.username}</div>
              <div style="color:var(--text-muted);font-size:0.78rem;">${formatDate(o.created_at)}</div>
            </div>
            <div class="flex" style="flex-direction:column;align-items:flex-end;gap:4px;">
              <span class="status-badge status-${o.status}">${STATUS_LABELS[o.status]}</span>
              <span style="font-weight:700;font-size:0.85rem;">${formatPrice(o.total_amount)}</span>
            </div>
          </div>
        `).join('')
        : '<div class="text-muted text-center" style="padding:20px;">ยังไม่มีออเดอร์</div>';

      const slipOrders = orders.filter(o => o.status === 'slip_uploaded');
      document.getElementById('pending-slips').innerHTML = slipOrders.length
        ? slipOrders.slice(0, 5).map(o => `
          <div class="flex-between" style="padding:10px 0;border-bottom:1px solid var(--border);">
            <div>
              <div style="font-weight:600;font-size:0.9rem;">#${o.id} - ${o.full_name || o.username}</div>
              <div style="font-weight:700;font-size:0.85rem;color:var(--primary);">${formatPrice(o.total_amount)}</div>
            </div>
            <a href="/admin/orders" class="btn btn-primary btn-sm">ตรวจสอบ</a>
          </div>
        `).join('')
        : '<div class="text-muted text-center" style="padding:20px;">ไม่มีสลิปรอตรวจ ✅</div>';
    }

    (async () => {
      const me = await api('/api/auth/me');
      if (!me.success || !me.user || me.user.role !== 'admin') {
        window.location.href = '/login'; return;
      }
      document.getElementById('admin-name').textContent = `👤 ${me.user.full_name || me.user.username}`;
      await loadDashboard();
    })();
  </script>
</body>
</html>
